<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papelería - Venta Local</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="contenedor">
        <h1>🧾 Registro de Papelería (Modo Local)</h1>
        
        <div class="formulario">
            <div class="fila"><label>Código:</label><input type="text" id="codigo" placeholder="Ej: PAP-001"></div>
            <div class="fila"><label>Nombre:</label><input type="text" id="nombre" placeholder="Ej: Cuaderno"></div>
            <div class="fila"><label>Precio Unitario ($):</label><input type="number" id="precio" placeholder="0.00" step="0.01" min="0"></div>
            <div class="fila"><label>Cantidad:</label><input type="number" id="cantidad" placeholder="0" min="0"></div>
            
            <div class="botones-accion">
                <button id="btnAgregar">➕ Agregar Producto</button>
            <button id="btnLimpiar">🧹 Limpiar Formulario</button>
            </div>
        </div>

        <div class="tabla-contenedor">
            <table id="tablaProductos">
                <thead>
                    <tr><th>Código</th><th>Nombre</th><th>Precio Unit.</th><th>Cantidad</th><th>Total Producto</th></tr>
                </thead>
                <tbody id="cuerpoTabla">
                    <tr class="fila-vacia"><td colspan="5">No hay productos registrados</td></tr>
                </tbody>
            </table>
        </div>

        <div class="total-general">
            <span>💰 TOTAL GENERAL: $<span id="totalGeneralValor">0.00</span></span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
